name: Code Quality

on:
  push:
    branches:
      - "**"

  workflow_dispatch:

jobs:
  check-types:
    name: Check Types

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check command
        run: pnpm check:types

  check-style:
    name: Check Style

    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run style check command
        run: pnpm check:style
